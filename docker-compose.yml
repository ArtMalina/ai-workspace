services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - web
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  web:
    build: ./web
    expose:
      - "3000"
    environment:
      - PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
